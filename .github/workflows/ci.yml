name: CI Verification

on:
  push:
    branches:
      - 'dev/**'
      - 'staging'
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  verify-build:
    name: Verify Compilation & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies 📦
        run: npm ci

      - name: Verify Build & Compile 🚀
        run: npm run build
        env:
          # In CI verification, repo name is mock-evaluated to ensure build succeeds
          NEXT_PUBLIC_REPO_NAME: '/meu-portfolio'
