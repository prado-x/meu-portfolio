name: Auto Pull Request

on:
  push:
    branches:
      - 'feature/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  create-pull-request:
    name: Auto PR to Develop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Check and Create PR 🚀
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          echo "Processing push to branch: $BRANCH_NAME"
          
          # Check if there is already an open pull request from this feature branch to develop
          PR_EXISTS=$(gh pr list --base develop --head "$BRANCH_NAME" --state open --json number --jq 'length')
          
          if [ "$PR_EXISTS" -eq "0" ]; then
            echo "No open PR found. Creating new PR to develop..."
            gh pr create \
              --base develop \
              --head "$BRANCH_NAME" \
              --title "feat: merge $BRANCH_NAME into develop" \
              --body "This is an automatic Pull Request created by GitHub Actions on push to the feature branch: $BRANCH_NAME."
          else
            echo "An open PR already exists for this branch to develop. Skipping creation."
          fi
