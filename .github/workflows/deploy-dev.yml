name: Deploy Dev Environment

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies 📦
        run: npm ci

      - name: Build and Export Dev 🚀
        run: npm run build
        env:
          NEXT_PUBLIC_REPO_NAME: ${{ !endsWith(github.event.repository.name, '.github.io') && format('{0}/dev', github.event.repository.name) || 'dev' }}

      - name: Deploy to Dev Folder 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          destination_dir: dev
          keep_files: true
